name: AI Issue Agent

on:
  workflow_call:

jobs:
  ai-agent:
    name: Run Claude Code on issue
    runs-on: ubuntu-latest
    if: github.event.action == 'labeled' && github.event.label.name == 'ai-agent'
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Slugify issue title
        id: slug
        run: |
          SLUG=$(echo "${{ github.event.issue.title }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//' \
            | cut -c1-50)
          echo "value=${SLUG}" >> $GITHUB_OUTPUT

      - name: Create feature branch
        run: |
          BRANCH="ai/${{ github.event.issue.number }}-${{ steps.slug.outputs.value }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print \
            "You are working on a GitHub issue. Make the minimal changes needed to address it.\n\nIssue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}\n\n${{ github.event.issue.body }}" \
            || echo "Claude Code exited with error $?"

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "made_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "ai: address issue #${{ github.event.issue.number }}"
            git push origin "$BRANCH"
            echo "made_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create draft PR (with changes)
        if: steps.commit.outputs.made_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "[AI] ${{ github.event.issue.title }}" \
            --body "Closes #${{ github.event.issue.number }}

          AI-generated draft. Review carefully before merging.

          **Issue:** #${{ github.event.issue.number }} — ${{ github.event.issue.title }}" \
            --base develop \
            --head "$BRANCH" \
            --draft \
            --reviewer "Firecrown-Media/firecrown-trusted-committers"

      - name: Create draft PR (no changes made)
        if: steps.commit.outputs.made_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git commit --allow-empty -m "ai: no changes generated for issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "[AI] ${{ github.event.issue.title }}" \
            --body "Closes #${{ github.event.issue.number }}

          :warning: The AI agent did not generate any changes for this issue. This PR is a placeholder — a human should review the issue and add implementation.

          **Issue:** #${{ github.event.issue.number }} — ${{ github.event.issue.title }}" \
            --base develop \
            --head "$BRANCH" \
            --draft \
            --reviewer "Firecrown-Media/firecrown-trusted-committers"

      - name: Remove ai-agent label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "ai-agent"
