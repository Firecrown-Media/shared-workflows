name: Sync to VIP

on:
  workflow_call:
    inputs:
      target_repo:
        description: 'Target wpcomvip repo (e.g. wpcomvip/astronomy-com)'
        required: true
        type: string
      target_branch:
        description: 'Branch to push to on the target repo (e.g. stage, production)'
        required: true
        type: string
      php_version:
        description: 'PHP version (for optional pre-sync steps)'
        required: false
        type: string
        default: '8.2'
      node_version:
        description: 'Node version (for optional pre-sync steps)'
        required: false
        type: string
        default: '20'
      check_vip_divergence:
        description: 'Check whether VIP has commits not present in this branch before pushing. Set to false to opt out (not recommended).'
        required: false
        type: boolean
        default: true

jobs:
  sync:
    name: Sync to ${{ inputs.target_repo }}@${{ inputs.target_branch }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup SSH deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VIP_DEPLOY_TOKEN }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Add VIP remote
        run: git remote add vip "git@github.com:${{ inputs.target_repo }}.git"

      - name: Fetch VIP branch
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/deploy_key
        run: git fetch vip ${{ inputs.target_branch }}

      - name: Check for VIP divergence
        id: divergence_check
        if: inputs.check_vip_divergence
        run: |
          AHEAD=$(git log HEAD..vip/${{ inputs.target_branch }} --oneline)
          if [ -n "$AHEAD" ]; then
            echo "::error::VIP has commits not present in this branch:"
            echo "$AHEAD"
            echo "::error::Merge the reverse sync PR before pushing to VIP."
            echo "ahead_commits<<EOF" >> $GITHUB_OUTPUT
            echo "$AHEAD" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Push to VIP
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/deploy_key
        run: git push vip "HEAD:refs/heads/${{ inputs.target_branch }}" --force

      - name: Identify the failing step (for Slack message)
        id: failing_step
        if: failure() && steps.divergence_check.outcome != 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          NAME=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs" \
            --jq '.jobs[] | select(.name | startswith("Sync to")) | .steps[] | select(.conclusion == "failure") | .name' \
            | head -1)
          echo "name=${NAME:-unknown step}" >> $GITHUB_OUTPUT

      - name: Notify Slack — divergence failure
        if: failure() && steps.divergence_check.outcome == 'failure' && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_VIP_PIPELINES_WEBHOOK }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_BRANCH="${{ inputs.target_branch }}"
          TARGET_REPO="${{ inputs.target_repo }}"
          ACTOR="${{ github.actor }}"
          SHA_SHORT=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          AHEAD="${{ steps.divergence_check.outputs.ahead_commits }}"
          HEAD_MSG="${{ github.event.head_commit.message }}"
          PR_NUM=$(printf '%s' "$HEAD_MSG" | head -1 | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
          PR_LINE=""
          if [ -n "$PR_NUM" ]; then
            PR_LINE=" · <${{ github.server_url }}/${{ github.repository }}/pull/${PR_NUM}|PR #${PR_NUM}>"
          fi
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg branch "$TARGET_BRANCH" \
            --arg target "$TARGET_REPO" \
            --arg ahead "$AHEAD" \
            --arg actor "$ACTOR" \
            --arg sha "$SHA_SHORT" \
            --arg msg "$COMMIT_MSG" \
            --arg pr_line "$PR_LINE" \
            --arg run_url "$RUN_URL" \
            --arg run_num "${{ github.run_number }}" \
            '{
              text: "⚠️ \($repo) \($branch) sync blocked — VIP has commits Firecrown doesn’t",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: "⚠️ *\($repo)* `\($branch)` sync blocked — VIP has commits Firecrown doesn’t" } },
                { type: "section", text: { type: "mrkdwn", text: ("`\($sha)` \($msg)\nby @\($actor)" + $pr_line) } },
                { type: "section", text: { type: "mrkdwn", text: "VIP-only commits:" } },
                { type: "rich_text", elements: [ { type: "rich_text_preformatted", elements: [ { type: "text", text: $ahead } ] } ] },
                { type: "section", text: { type: "mrkdwn", text: "Resolve: `gh workflow run vip-reverse-sync.yml --repo Firecrown-Media/\($repo) --ref main`" } },
                { type: "context", elements: [ { type: "mrkdwn", text: "Run #\($run_num) · <\($run_url)|view logs>" } ] }
              ]
            }')
          curl -fsS -X POST -H 'content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: Notify Slack — sync failure (other)
        if: failure() && steps.divergence_check.outcome != 'failure' && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_VIP_PIPELINES_WEBHOOK }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_BRANCH="${{ inputs.target_branch }}"
          ACTOR="${{ github.actor }}"
          SHA_SHORT=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          FAILING_STEP="${{ steps.failing_step.outputs.name }}"
          [ -z "$FAILING_STEP" ] && FAILING_STEP="unknown step"
          HEAD_MSG="${{ github.event.head_commit.message }}"
          PR_NUM=$(printf '%s' "$HEAD_MSG" | head -1 | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
          PR_LINE=""
          if [ -n "$PR_NUM" ]; then
            PR_LINE=" · <${{ github.server_url }}/${{ github.repository }}/pull/${PR_NUM}|PR #${PR_NUM}>"
          fi
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg branch "$TARGET_BRANCH" \
            --arg step "$FAILING_STEP" \
            --arg actor "$ACTOR" \
            --arg sha "$SHA_SHORT" \
            --arg msg "$COMMIT_MSG" \
            --arg pr_line "$PR_LINE" \
            --arg run_url "$RUN_URL" \
            --arg run_num "${{ github.run_number }}" \
            '{
              text: "❌ \($repo) \($branch) sync failed at \($step)",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: "❌ *\($repo)* `\($branch)` sync failed at *\($step)*" } },
                { type: "section", text: { type: "mrkdwn", text: ("`\($sha)` \($msg)\nby @\($actor)" + $pr_line) } },
                { type: "context", elements: [ { type: "mrkdwn", text: "Run #\($run_num) · <\($run_url)|view logs>" } ] }
              ]
            }')
          curl -fsS -X POST -H 'content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: Notify Slack — sync success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_VIP_PIPELINES_WEBHOOK }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TARGET_BRANCH="${{ inputs.target_branch }}"
          TARGET_REPO="${{ inputs.target_repo }}"
          ACTOR="${{ github.actor }}"
          SHA_SHORT=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "$TARGET_BRANCH" = "production" ]; then
            EMOJI="🚀"
          else
            EMOJI="✅"
          fi
          HEAD_MSG="${{ github.event.head_commit.message }}"
          PR_NUM=$(printf '%s' "$HEAD_MSG" | head -1 | grep -oE '#[0-9]+' | head -1 | tr -d '#' || true)
          PR_LINE=""
          if [ -n "$PR_NUM" ]; then
            PR_LINE=" · <${{ github.server_url }}/${{ github.repository }}/pull/${PR_NUM}|PR #${PR_NUM}>"
          fi
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg target "$TARGET_REPO" \
            --arg branch "$TARGET_BRANCH" \
            --arg sha "$SHA_SHORT" \
            --arg msg "$COMMIT_MSG" \
            --arg actor "$ACTOR" \
            --arg pr_line "$PR_LINE" \
            --arg emoji "$EMOJI" \
            --arg run_url "$RUN_URL" \
            --arg run_num "${{ github.run_number }}" \
            '{
              text: "\($emoji) \($repo) → \($target):\($branch)",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: "\($emoji) *\($repo)* → `\($target):*\($branch)*`" } },
                { type: "section", text: { type: "mrkdwn", text: ("`\($sha)` \($msg)\nby @\($actor)" + $pr_line) } },
                { type: "context", elements: [ { type: "mrkdwn", text: "Run #\($run_num) · <\($run_url)|view logs>" } ] }
              ]
            }')
          curl -fsS -X POST -H 'content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
