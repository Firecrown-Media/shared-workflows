name: Reverse Sync from VIP

on:
  workflow_call:
    inputs:
      source_repo:
        description: 'VIP repo to check (e.g. wpcomvip/astronomy-com)'
        required: true
        type: string
      source_branch:
        description: 'VIP branch to check (e.g. production)'
        required: true
        type: string
      target_branch:
        description: 'Branch in the calling repo to target for the PR'
        required: false
        type: string
        default: 'main'

jobs:
  reverse-sync:
    name: Check ${{ inputs.source_repo }}@${{ inputs.source_branch }} for hotfixes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VIP_DEPLOY_TOKEN }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Add VIP remote and fetch
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/deploy_key
        run: |
          git remote add vip "git@github.com:${{ inputs.source_repo }}.git"
          git fetch vip ${{ inputs.source_branch }}

      - name: Check for divergence
        id: divergence
        run: |
          COMMITS=$(git log HEAD..vip/${{ inputs.source_branch }} --oneline)
          if [ -z "$COMMITS" ]; then
            echo "VIP is in sync — nothing to do."
            echo "has_divergence=false" >> $GITHUB_OUTPUT
          else
            echo "VIP has commits not in ${{ inputs.target_branch }}:"
            echo "$COMMITS"
            echo "has_divergence=true" >> $GITHUB_OUTPUT
            echo "commits<<EOF" >> $GITHUB_OUTPUT
            echo "$COMMITS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Check for existing hotfix PR
        id: existing_pr
        if: steps.divergence.outputs.has_divergence == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=$(gh pr list --label vip-hotfix --state open --json number,headRefName,url --jq '.[0]')
          if [ -n "$PR" ]; then
            PR_NUMBER=$(echo "$PR" | jq -r '.number')
            PR_BRANCH=$(echo "$PR" | jq -r '.headRefName')
            PR_URL=$(echo "$PR" | jq -r '.url')
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Ensure vip-hotfix label exists
        if: steps.divergence.outputs.has_divergence == 'true' && steps.existing_pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create vip-hotfix \
            --color FF6B35 \
            --description "Reverse-sync PR from VIP — review and promote down to stage/develop" \
            2>/dev/null || true

      - name: Create hotfix branch (no open PR)
        id: create_hotfix
        if: steps.divergence.outputs.has_divergence == 'true' && steps.existing_pr.outputs.exists == 'false'
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/deploy_key
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="vip-hotfix/$(date +'%Y-%m-%d')"
          git checkout -b "$BRANCH" vip/${{ inputs.source_branch }}
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore: reverse sync VIP hotfix to ${{ inputs.target_branch }}" \
            --base "${{ inputs.target_branch }}" \
            --head "$BRANCH" \
            --label "vip-hotfix" \
            --body "## VIP Hotfix Reverse Sync

          Commits found on \`${{ inputs.source_repo }}:${{ inputs.source_branch }}\` that are not in \`${{ inputs.target_branch }}\`:

          \`\`\`
          ${{ steps.divergence.outputs.commits }}
          \`\`\`

          ## After merging this PR

          Propagate the hotfix to all branches:

          \`\`\`bash
          # Merge main into stage
          git checkout stage && git merge main && git push

          # Merge stage into develop
          git checkout develop && git merge stage && git push
          \`\`\`

          Alternatively, cherry-pick only the hotfix commits if you do not want to cascade unrelated changes from main.

          > This PR was opened automatically by the VIP reverse sync workflow.")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Notify Slack — hotfix PR opened
        if: steps.divergence.outputs.has_divergence == 'true' && steps.existing_pr.outputs.exists == 'false' && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_VIP_PIPELINES_WEBHOOK }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          PR_URL="${{ steps.create_hotfix.outputs.pr_url }}"
          COMMITS="${{ steps.divergence.outputs.commits }}"
          COUNT=$(echo "$COMMITS" | wc -l | tr -d ' ')
          ACTOR="${{ github.actor }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg pr "$PR_URL" \
            --arg commits "$COMMITS" \
            --arg count "$COUNT" \
            --arg actor "$ACTOR" \
            --arg source "${{ inputs.source_repo }}:${{ inputs.source_branch }}" \
            --arg run_url "$RUN_URL" \
            --arg run_num "${{ github.run_number }}" \
            '{
              text: "🔄 \($repo) — VIP hotfix PR opened",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: "🔄 *\($repo)* — VIP hotfix PR opened" } },
                { type: "section", text: { type: "mrkdwn", text: "\($count) commit(s) from `\($source)` · triggered by @\($actor)" } },
                { type: "rich_text", elements: [ { type: "rich_text_preformatted", elements: [ { type: "text", text: $commits } ] } ] },
                { type: "context", elements: [ { type: "mrkdwn", text: "<\($pr)|view PR> · <\($run_url)|view run>" } ] }
              ]
            }')
          curl -fsS -X POST -H 'content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"

      - name: Update existing hotfix branch (open PR exists)
        if: steps.divergence.outputs.has_divergence == 'true' && steps.existing_pr.outputs.exists == 'true'
        env:
          GIT_SSH_COMMAND: ssh -i ~/.ssh/deploy_key
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.existing_pr.outputs.pr_branch }}"
          git push origin "vip/${{ inputs.source_branch }}:refs/heads/$BRANCH" --force-with-lease
          gh pr comment "${{ steps.existing_pr.outputs.pr_number }}" \
            --body "VIP has new commits not yet in \`${{ inputs.target_branch }}\`. This branch has been updated to include them:

          \`\`\`
          ${{ steps.divergence.outputs.commits }}
          \`\`\`"

      - name: Notify Slack — hotfix PR updated
        if: steps.divergence.outputs.has_divergence == 'true' && steps.existing_pr.outputs.exists == 'true' && env.SLACK_WEBHOOK_URL != ''
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_VIP_PIPELINES_WEBHOOK }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          PR_URL="${{ steps.existing_pr.outputs.pr_url }}"
          COMMITS="${{ steps.divergence.outputs.commits }}"
          ACTOR="${{ github.actor }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg pr "$PR_URL" \
            --arg commits "$COMMITS" \
            --arg actor "$ACTOR" \
            --arg run_url "$RUN_URL" \
            --arg run_num "${{ github.run_number }}" \
            '{
              text: "🔄 \($repo) — existing hotfix PR updated",
              blocks: [
                { type: "section", text: { type: "mrkdwn", text: "🔄 *\($repo)* — existing hotfix PR updated with new VIP commits" } },
                { type: "section", text: { type: "mrkdwn", text: "triggered by @\($actor)" } },
                { type: "rich_text", elements: [ { type: "rich_text_preformatted", elements: [ { type: "text", text: $commits } ] } ] },
                { type: "context", elements: [ { type: "mrkdwn", text: "<\($pr)|view PR> · <\($run_url)|view run>" } ] }
              ]
            }')
          curl -fsS -X POST -H 'content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
